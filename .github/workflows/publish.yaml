name: publish

on:
  push:
    tags:
      - '*-*/*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve tag
        id: tag
        run: |
          tag="${GITHUB_REF_NAME}"
          plugin="${tag%%/*}"
          version="${tag#*/}"
          family="${plugin%%-*}"
          name="${plugin#*-}"
          upstream_dir="upstream/bufbuild-plugins/plugins/${family}/${name}/${version}"
          dockerfile="${upstream_dir}/Dockerfile"
          image="ghcr.io/${GITHUB_REPOSITORY}/${plugin}:${version}"

          if [[ "${tag}" == "${version}" || "${family}" == "${plugin}" || ! -f "${dockerfile}" ]]; then
            echo "invalid plugin tag: ${tag}" >&2
            exit 1
          fi

          {
            echo "plugin=${plugin}"
            echo "version=${version}"
            echo "upstream_dir=${upstream_dir}"
            echo "dockerfile=${dockerfile}"
            echo "image=${image}"
          } >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.tag.outputs.upstream_dir }}
          file: ${{ steps.tag.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tag.outputs.image }}
